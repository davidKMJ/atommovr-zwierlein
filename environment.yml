name: atommovr_env
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.13
  - numpy
  - scipy
  - scikit-learn
  - xarray
  - ipykernel
  - matplotlib
  - seaborn
  - setuptools # needed because lazy-build calls PPSU/setupc.py
  - pip
  - pip:
      - -e .[dev]
      - imageio==2.36.1
      - pillow==11.1.0
